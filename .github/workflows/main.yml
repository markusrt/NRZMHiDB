# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
        
    - name: Restore NuGet packages
      run: dotnet restore HaemophilusWeb.sln
        
    - name: Build solution
      run: dotnet build HaemophilusWeb.sln --configuration Debug --no-restore
      
    - name: Run unit tests
      run: dotnet test HaemophilusWebTests/HaemophilusWebTests.csproj --configuration Debug --no-build --verbosity normal
